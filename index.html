<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Sensor Data</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h2>ESP32 Sensor Data</h2>
    <label for="timeRange">Select Time Range:</label>
    <select id="timeRange">
        <option value="1">Last 1 Hour</option>
        <option value="3">Last 3 Hours</option>
        <option value="6">Last 6 Hours</option>
    </select>
    <canvas id="sensorChart"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAkmtB79Rt1gzfRb7-R5hBaXhNln6hcAlA",
              authDomain: "sensordata-e720d.firebaseapp.com",
              databaseURL: "https://sensordata-e720d-default-rtdb.europe-west1.firebasedatabase.app",
              projectId: "sensordata-e720d",
              storageBucket: "sensordata-e720d.firebasestorage.app",
              messagingSenderId: "134640996581",
              appId: "1:134640996581:web:33da07f917360256a2040c",
              measurementId: "G-B32EC2D1E6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dataRef = ref(db, "sensorData");

        let labels = [];
        let temperatureData = [];
        let humidityData = [];

        const ctx = document.getElementById("sensorChart").getContext("2d");
        const sensorChart = new Chart(ctx, {
            type: "line",
            data: {
                labels: labels,
                datasets: [
                    {
                        label: "Temperature (°C)",
                        data: temperatureData,
                        borderColor: "red",
                        fill: false
                    },
                    {
                        label: "Humidity (%)",
                        data: humidityData,
                        borderColor: "blue",
                        fill: false
                    }
                ]
            },
            options: {
                responsive: true,
                scales: {
                    x: { title: { display: true, text: "Timestamp" } },
                    y: { title: { display: true, text: "Value" } }
                }
            }
        });

        function updateChart(timeRange) {
            onValue(dataRef, (snapshot) => {
                const data = snapshot.val();
                labels.length = 0;
                temperatureData.length = 0;
                humidityData.length = 0;
                
                const now = Date.now();
                const cutoffTime = now - timeRange * 60 * 60 * 1000; // Convert hours to milliseconds
                
                Object.keys(data).forEach((key) => {
                    const timestamp = data[key].timestamp;
                    if (timestamp >= cutoffTime) {
                        labels.push(new Date(timestamp).toLocaleTimeString());
                        temperatureData.push(data[key].temperature);
                        humidityData.push(data[key].humidity);
                    }
                });
                
                sensorChart.update();
            });
        }

        document.getElementById("timeRange").addEventListener("change", (event) => {
            updateChart(parseInt(event.target.value));
        });

        updateChart(1); // Default to last 1 hour
    </script>
</body>
</html>
