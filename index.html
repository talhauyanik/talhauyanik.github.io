<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Sensor Data</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>ESP32 Sensor Data</h2>

    <!-- Tarih Seçici ve Filtreleme Butonları -->
    <div class="filter-container">
        <button onclick="filterData('1h')">Son 1 Saat</button>
        <button onclick="filterData('3h')">Son 3 Saat</button>
        <button onclick="filterData('6h')">Son 6 Saat</button>
        <button onclick="filterData('12h')">Son 12 Saat</button>
        <button onclick="filterData('1d')">Son 1 Gün</button>
        <button onclick="filterData('3d')">Son 3 Gün</button>
        <button onclick="filterData('1w')">Son 1 Hafta</button>
        <button onclick="filterData('1m')">Son 1 Ay</button>
        <button onclick="filterData('3m')">Son 3 Ay</button>
        <button onclick="filterData('6m')">Son 6 Ay</button>
        <button onclick="filterData('1y')">Son 1 Yıl</button>
        <button onclick="filterData('all')">Tüm Zamanlar</button>
    </div>

    <!-- Özel Tarih Aralığı Seçici -->
    <input type="text" id="customDateRange" placeholder="Özel Tarih Seç" />

    <canvas id="sensorChart"></canvas>

    <script type="module" src="script.js"></script>
</body>
</html>
